<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio CSS</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }

    header {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(180deg, #0f172a, #020617);
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    header p {
      color: #94a3b8;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      margin-top: 40px;
      margin-bottom: 20px;
      color: #38bdf8;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
      background: #334155;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #94a3b8;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Anne Moura</h1>
    <p>Estudante de Ciência da Computação • Front-End em formação</p>
    <div style="margin-top: 15px;">
      <a href="https://github.com/annemoura" target="_blank" style="margin: 5px; color: #38bdf8;">GitHub</a>
      <a href="https://www.linkedin.com/in/anne-moura-4a4567319" target="_blank"
        style="margin: 5px; color: #38bdf8;">LinkedIn</a>
    </div>
  </header>

  <div class="container">

    <h2>📚 Estudos</h2>
    <div class="cards">
      <a class="card" href="cores-fontes/index.html">🎨 Cores e Fontes</a>
      <a class="card" href="display/index.html">📦 Display</a>
      <a class="card" href="seletores/index.html">🎯 Seletores</a>
    </div>

    <h2>💻 Exercícios</h2>
    <div class="cards">
      <a class="card" href="exercico-css/exercicio-1/index.html">Exercício 1</a>
      <a class="card" href="exercico-css/exercicio-2/index.html">Exercício 2</a>
      <a class="card" href="exercico-css/exercicio-3/index.html">Exercício 3</a>
      <a class="card" href="exercico-css/exercicio-4/index.html">Exercício 4</a>
      <a class="card" href="exercico-css/exercicio-5/index.html">Exercício 5</a>
      <a class="card" href="exercico-css/exercicio-6/index.html">Exercício 6</a>
    </div>

  </div>

  <footer>
    © 2026 • Projeto de estudos em CSS
  </footer>

</body>

</html>
